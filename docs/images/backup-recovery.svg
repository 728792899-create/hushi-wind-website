<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">备份恢复与回滚决策 / Backup, recovery and rollback</title><desc id="desc">展示备份、校验、隔离恢复、完整性验证、冒烟和流量切换流程，并区分应用回滚和数据恢复。</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#78c6a3"/></marker></defs><rect width="1200" height="675" rx="28" fill="#090b0d"/><g font-family="Arial,sans-serif"><text x="65" y="72" fill="#f2f5f4" font-size="34" font-weight="700">恢复决策 / RECOVERY DECISION</text><text x="65" y="108" fill="#8d9995" font-size="16">A backup is not trusted until restore is verified</text>
    <g fill="#11171a" stroke="#33413d"><rect x="65" y="205" width="190" height="110" rx="18"/><rect x="305" y="205" width="190" height="110" rx="18"/><rect x="545" y="205" width="190" height="110" rx="18"/><rect x="785" y="205" width="190" height="110" rx="18"/><rect x="1025" y="205" width="110" height="110" rx="18"/></g>
    <g text-anchor="middle"><text x="160" y="249" fill="#78c6a3" font-size="18" font-weight="700">备份</text><text x="160" y="279" fill="#dfe4e1" font-size="14">consistent backup</text><text x="400" y="249" fill="#78c6a3" font-size="18" font-weight="700">校验</text><text x="400" y="279" fill="#dfe4e1" font-size="14">checksum + record</text><text x="640" y="249" fill="#78c6a3" font-size="18" font-weight="700">隔离恢复</text><text x="640" y="279" fill="#dfe4e1" font-size="14">isolated restore</text><text x="880" y="249" fill="#78c6a3" font-size="18" font-weight="700">完整性</text><text x="880" y="279" fill="#dfe4e1" font-size="14">integrity + row counts</text><text x="1080" y="249" fill="#78c6a3" font-size="18" font-weight="700">冒烟</text><text x="1080" y="279" fill="#dfe4e1" font-size="14">smoke</text></g>
    <g stroke="#78c6a3" stroke-width="3" marker-end="url(#a)"><path d="M255 260 H300"/><path d="M495 260 H540"/><path d="M735 260 H780"/><path d="M975 260 H1020"/></g>
    <rect x="100" y="410" width="445" height="150" rx="22" fill="#12221c" stroke="#315b49"/><text x="135" y="455" fill="#9ed7b3" font-size="22" font-weight="700">应用回滚 / APP ROLLBACK</text><text x="135" y="495" fill="#dfe4e1" font-size="16">代码/配置问题 · schema 向后兼容</text><text x="135" y="528" fill="#97a49f" font-size="14">Deploy previous immutable artifact</text>
    <rect x="655" y="410" width="445" height="150" rx="22" fill="#241e12" stroke="#6d5c34"/><text x="690" y="455" fill="#ead29a" font-size="22" font-weight="700">数据恢复 / DATA RESTORE</text><text x="690" y="495" fill="#dfe4e1" font-size="16">损坏/误删 · 明确 RPO/RTO</text><text x="690" y="528" fill="#b8aa86" font-size="14">Restore verified backup, then switch traffic</text>
    <text x="600" y="625" text-anchor="middle" fill="#87928e" font-size="15">Never overwrite the last verified recovery point during investigation</text></g>
</svg>
