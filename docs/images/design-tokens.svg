<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">设计令牌与无障碍状态 / Design tokens and accessible states</title><desc id="desc">展示黑白绿色彩、间距、圆角、动画和加载空错误成功状态。</desc>
  <rect width="1200" height="675" rx="28" fill="#080a0c"/><g font-family="Arial,sans-serif"><text x="65" y="72" fill="#f2f5f4" font-size="34" font-weight="700">设计令牌 / DESIGN TOKENS</text><text x="65" y="108" fill="#8d9995" font-size="16">Premium monochrome · restrained green · explicit states</text>
    <text x="65" y="175" fill="#dfe4e1" font-size="18" font-weight="700">COLOR / 颜色</text><g><rect x="65" y="195" width="125" height="90" rx="14" fill="#07080a" stroke="#30383a"/><rect x="205" y="195" width="125" height="90" rx="14" fill="#151a20"/><rect x="345" y="195" width="125" height="90" rx="14" fill="#eef2f4"/><rect x="485" y="195" width="125" height="90" rx="14" fill="#78c6a3"/><rect x="625" y="195" width="125" height="90" rx="14" fill="#d9b76e"/><rect x="765" y="195" width="125" height="90" rx="14" fill="#ef7f7f"/></g>
    <text x="65" y="350" fill="#dfe4e1" font-size="18" font-weight="700">SPACE / 间距</text><g fill="#78c6a3"><rect x="65" y="380" width="4" height="42"/><rect x="110" y="380" width="8" height="42"/><rect x="160" y="380" width="12" height="42"/><rect x="215" y="380" width="16" height="42"/><rect x="275" y="380" width="24" height="42"/></g><g fill="#8d9995" font-size="14"><text x="62" y="450">4</text><text x="107" y="450">8</text><text x="154" y="450">12</text><text x="211" y="450">16</text><text x="273" y="450">24</text></g>
    <text x="370" y="350" fill="#dfe4e1" font-size="18" font-weight="700">RADIUS / 圆角</text><rect x="370" y="380" width="125" height="70" rx="8" fill="#151a20" stroke="#39433f"/><rect x="520" y="380" width="125" height="70" rx="14" fill="#151a20" stroke="#39433f"/><text x="432" y="477" text-anchor="middle" fill="#8d9995" font-size="14">control 8</text><text x="582" y="477" text-anchor="middle" fill="#8d9995" font-size="14">card 14</text>
    <text x="720" y="350" fill="#dfe4e1" font-size="18" font-weight="700">MOTION / 动画</text><rect x="720" y="380" width="150" height="12" rx="6" fill="#78c6a3"/><rect x="720" y="420" width="245" height="12" rx="6" fill="#4b8069"/><text x="890" y="391" fill="#8d9995" font-size="14">160ms</text><text x="985" y="431" fill="#8d9995" font-size="14">260ms</text>
    <text x="65" y="540" fill="#dfe4e1" font-size="18" font-weight="700">STATES / 状态</text><g font-size="15" font-weight="700"><rect x="65" y="565" width="210" height="52" rx="12" fill="#192027"/><text x="170" y="598" text-anchor="middle" fill="#c3ccd1">LOADING</text><rect x="295" y="565" width="210" height="52" rx="12" fill="#1b1e21"/><text x="400" y="598" text-anchor="middle" fill="#a9b1b5">EMPTY</text><rect x="525" y="565" width="210" height="52" rx="12" fill="#341d20"/><text x="630" y="598" text-anchor="middle" fill="#ff9da2">ERROR + RETRY</text><rect x="755" y="565" width="210" height="52" rx="12" fill="#163126"/><text x="860" y="598" text-anchor="middle" fill="#a9dfc0">SUCCESS</text></g>
    <rect x="1010" y="175" width="125" height="310" rx="18" fill="none" stroke="#78c6a3" stroke-width="4"/><text x="1072" y="520" text-anchor="middle" fill="#9ed7b3" font-size="14">FOCUS VISIBLE</text></g>
</svg>
