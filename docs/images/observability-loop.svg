<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">三端可观测性闭环</title>
  <desc id="desc">用户体验、业务转化、应用错误、日志和健康检查共同进入告警与运营决策</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07090a"/><stop offset="1" stop-color="#151c18"/></linearGradient><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#9ed7b3"/></marker></defs>
  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <text x="56" y="64" fill="#9ed7b3" font-size="17" font-weight="700" letter-spacing="4">OBSERVABILITY LOOP</text>
    <text x="56" y="108" fill="#fff" font-size="34" font-weight="750">错误、性能和转化必须在同一张图上</text>
    <g transform="translate(600 355)" text-anchor="middle">
      <circle r="112" fill="#17241d" stroke="#9ed7b3" stroke-width="3"/>
      <text y="-16" fill="#9ed7b3" font-size="17" font-weight="700">OPERATIONS</text><text y="20" fill="#fff" font-size="25" font-weight="750">发现 → 定位 → 行动</text><text y="52" fill="#849189" font-size="15">Release-aware triage</text>
    </g>
    <g text-anchor="middle">
      <g transform="translate(190 230)"><rect x="-126" y="-58" width="252" height="116" rx="22" fill="#121916" stroke="#35443c"/><text y="-12" fill="#fff" font-size="21" font-weight="700">Core Web Vitals</text><text y="22" fill="#849189" font-size="15">LCP · INP · CLS</text></g>
      <g transform="translate(190 500)"><rect x="-126" y="-58" width="252" height="116" rx="22" fill="#121916" stroke="#35443c"/><text y="-12" fill="#fff" font-size="21" font-weight="700">Conversion Events</text><text y="22" fill="#849189" font-size="15">View · Compare · Submit</text></g>
      <g transform="translate(1010 230)"><rect x="-126" y="-58" width="252" height="116" rx="22" fill="#121916" stroke="#35443c"/><text y="-12" fill="#fff" font-size="21" font-weight="700">Sentry × 3</text><text y="22" fill="#849189" font-size="15">Website · CMS · API</text></g>
      <g transform="translate(1010 500)"><rect x="-126" y="-58" width="252" height="116" rx="22" fill="#121916" stroke="#35443c"/><text y="-12" fill="#fff" font-size="21" font-weight="700">Health + JSON Logs</text><text y="22" fill="#849189" font-size="15">5xx · p95 · Dependencies</text></g>
    </g>
    <g fill="none" stroke="#9ed7b3" stroke-width="3" marker-end="url(#a)"><path d="M316 230c120 0 118 52 180 82"/><path d="M316 500c120 0 118-54 180-84"/><path d="M884 230c-120 0-118 52-180 82"/><path d="M884 500c-120 0-118-54-180-84"/></g>
    <rect x="310" y="584" width="580" height="52" rx="16" fill="#0f1512" stroke="#313f37"/>
    <text x="600" y="616" text-anchor="middle" fill="#b5c0ba" font-size="16">PII scrubbing · immutable release · environment tag · alert ownership</text>
  </g>
