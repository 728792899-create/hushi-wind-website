<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">系统安全纵深防御层</title>
  <desc id="desc">请求从网关到数据持久化依次经过 CORS、限流、会话、CSRF、RBAC、校验和审计</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07090a"/><stop offset="1" stop-color="#151c18"/></linearGradient></defs>
  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <text x="56" y="64" fill="#9ed7b3" font-size="17" font-weight="700" letter-spacing="4">DEFENSE IN DEPTH</text>
    <text x="56" y="108" fill="#fff" font-size="34" font-weight="750">默认拒绝，逐层收紧写操作</text>
    <g transform="translate(92 166)" text-anchor="middle">
      <rect x="0" y="0" width="1016" height="74" rx="18" fill="#1b2520" stroke="#4c6557"/><text x="508" y="31" fill="#9ed7b3" font-size="16" font-weight="700">EDGE</text><text x="508" y="57" fill="#fff" font-size="19">TLS · WAF · CORS Allowlist · Shared Rate Limit</text>
      <rect x="70" y="94" width="876" height="74" rx="18" fill="#18211d" stroke="#45594e"/><text x="508" y="125" fill="#9ed7b3" font-size="16" font-weight="700">IDENTITY</text><text x="508" y="151" fill="#fff" font-size="19">Timed Session · Login Lock · Optional 2FA · IP Allowlist</text>
      <rect x="140" y="188" width="736" height="74" rx="18" fill="#151d1a" stroke="#3d4e45"/><text x="508" y="219" fill="#9ed7b3" font-size="16" font-weight="700">AUTHORIZATION</text><text x="508" y="245" fill="#fff" font-size="19">Per-session CSRF · RBAC Permission · Token Version</text>
      <rect x="210" y="282" width="596" height="74" rx="18" fill="#121816" stroke="#35443c"/><text x="508" y="313" fill="#9ed7b3" font-size="16" font-weight="700">INPUT</text><text x="508" y="339" fill="#fff" font-size="19">Schema Validation · MIME + Magic Bytes · Safe Filename</text>
      <rect x="280" y="376" width="456" height="74" rx="18" fill="#0f1512" stroke="#9ed7b3"/><text x="508" y="407" fill="#9ed7b3" font-size="16" font-weight="700">EVIDENCE</text><text x="508" y="433" fill="#fff" font-size="19">Audit Log · Alert · Backup · Sentry Scrubbing</text>
    </g>
    <text x="56" y="638" fill="#74827b" font-size="16">Production refuses demo credentials, weak secrets, placeholder domains and unsafe multi-instance defaults before listening.</text>
  </g>
</svg>
