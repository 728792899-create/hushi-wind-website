<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">内容发布、版本与恢复生命周期 / Content lifecycle</title><desc id="desc">描述草稿、校验、版本、发布、官网读取、编辑和恢复的闭环。</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3z" fill="#78c6a3"/></marker></defs><rect width="1200" height="675" rx="28" fill="#090c0e"/><g font-family="Arial,sans-serif"><text x="65" y="72" fill="#f2f5f4" font-size="34" font-weight="700">内容生命周期 / CONTENT LIFECYCLE</text><text x="65" y="108" fill="#8d9995" font-size="16">Every edit and restore remains auditable</text>
    <g fill="#11171a" stroke="#32403b"><rect x="65" y="235" width="170" height="125" rx="18"/><rect x="290" y="235" width="170" height="125" rx="18"/><rect x="515" y="235" width="170" height="125" rx="18"/><rect x="740" y="235" width="170" height="125" rx="18"/><rect x="965" y="235" width="170" height="125" rx="18"/></g>
    <g text-anchor="middle"><text x="150" y="281" fill="#78c6a3" font-size="18" font-weight="700">草稿 / DRAFT</text><text x="150" y="320" fill="#dfe4e1" font-size="15">编辑内容</text><text x="375" y="281" fill="#78c6a3" font-size="18" font-weight="700">校验 / VALIDATE</text><text x="375" y="320" fill="#dfe4e1" font-size="15">CSRF · RBAC · fields</text><text x="600" y="281" fill="#78c6a3" font-size="18" font-weight="700">版本 / VERSION</text><text x="600" y="320" fill="#dfe4e1" font-size="15">保存 before 快照</text><text x="825" y="281" fill="#78c6a3" font-size="18" font-weight="700">发布 / PUBLISH</text><text x="825" y="320" fill="#dfe4e1" font-size="15">published + audit</text><text x="1050" y="281" fill="#78c6a3" font-size="18" font-weight="700">公开 / PUBLIC</text><text x="1050" y="320" fill="#dfe4e1" font-size="15">Nuxt SSR read</text></g>
    <g stroke="#78c6a3" stroke-width="3" marker-end="url(#a)"><path d="M235 298 H285"/><path d="M460 298 H510"/><path d="M685 298 H735"/><path d="M910 298 H960"/></g>
    <path d="M1050 365 C1050 510 825 530 600 470" fill="none" stroke="#d9b76e" stroke-width="3" marker-end="url(#a)"/><rect x="410" y="425" width="380" height="105" rx="52" fill="#201c12" stroke="#695b35"/><text x="600" y="468" text-anchor="middle" fill="#ead29a" font-size="20" font-weight="700">恢复 / RESTORE</text><text x="600" y="500" text-anchor="middle" fill="#c8b98f" font-size="15">选择历史快照 → 写入新版本 → 再审计</text>
    <text x="600" y="615" text-anchor="middle" fill="#87928e" font-size="15">Content rollback is not a database restore</text></g>
</svg>
