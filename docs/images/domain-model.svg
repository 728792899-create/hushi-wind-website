<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">核心领域数据模型 / Core domain model</title><desc id="desc">将产品内容、线索、身份审计、恢复和可观测性模型按领域分组。</desc>
  <rect width="1200" height="675" rx="28" fill="#090b0d"/><g font-family="Arial,sans-serif"><text x="65" y="70" fill="#f2f5f4" font-size="34" font-weight="700">领域模型 / DOMAIN MODEL</text><text x="65" y="105" fill="#8e9996" font-size="16">Prisma schemas: SQLite Demo ↔ PostgreSQL Production</text>
    <rect x="65" y="155" width="410" height="210" rx="20" fill="#11171a" stroke="#33413d"/><text x="95" y="198" fill="#78c6a3" font-size="21" font-weight="700">商品与内容 / CONTENT</text><text x="95" y="238" fill="#e4e8e6" font-size="17">Product · Article · Artist · PageContent</text><text x="95" y="275" fill="#a5afab" font-size="16">FAQ · Download · Audio · Timeline</text><text x="95" y="312" fill="#a5afab" font-size="16">SystemConfig · Guide · Ecosystem</text>
    <rect x="725" y="155" width="410" height="210" rx="20" fill="#11171a" stroke="#33413d"/><text x="755" y="198" fill="#d9b76e" font-size="21" font-weight="700">客户线索 / LEADS</text><text x="755" y="244" fill="#e4e8e6" font-size="18">Inquiry</text><text x="755" y="283" fill="#e4e8e6" font-size="18">ArtistApplication</text><text x="755" y="322" fill="#9da8a4" font-size="15">PII access controlled by CRM permissions</text>
    <rect x="65" y="420" width="330" height="170" rx="20" fill="#0f1417" stroke="#2a3632"/><text x="95" y="463" fill="#78c6a3" font-size="20" font-weight="700">身份与审计 / IDENTITY</text><text x="95" y="505" fill="#dfe4e1" font-size="16">AdminUser · LoginRecord</text><text x="95" y="540" fill="#dfe4e1" font-size="16">OperationLog · ExportRecord</text>
    <rect x="435" y="420" width="330" height="170" rx="20" fill="#0f1417" stroke="#2a3632"/><text x="465" y="463" fill="#78c6a3" font-size="20" font-weight="700">恢复 / RECOVERY</text><text x="465" y="505" fill="#dfe4e1" font-size="16">ContentVersion</text><text x="465" y="540" fill="#dfe4e1" font-size="16">BackupRecord</text>
    <rect x="805" y="420" width="330" height="170" rx="20" fill="#0f1417" stroke="#2a3632"/><text x="835" y="463" fill="#78c6a3" font-size="20" font-weight="700">可观测性 / SIGNALS</text><text x="835" y="505" fill="#dfe4e1" font-size="16">AnalyticsEvent · ApiRequestLog</text><text x="835" y="540" fill="#dfe4e1" font-size="16">AlertRecord</text>
    <path d="M475 260 H720 M230 365 V415 M600 365 V415 M970 365 V415" stroke="#78c6a3" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="600" y="632" text-anchor="middle" fill="#83908b" font-size="15">API contracts isolate clients from persistence details</text></g>
</svg>
