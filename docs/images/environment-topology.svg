<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">本地、预发布与生产环境拓扑 / Environment topology</title>
  <desc id="desc">比较本地 Demo、staging 和 production 的数据库、素材、限流与监控边界。</desc>
  <defs><linearGradient id="bg" x2="1"><stop stop-color="#080a0c"/><stop offset="1" stop-color="#11181a"/></linearGradient></defs><rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <g font-family="Arial,sans-serif"><text x="65" y="72" fill="#f2f5f4" font-size="34" font-weight="700">环境拓扑 / ENVIRONMENT TOPOLOGY</text><text x="65" y="108" fill="#8d9995" font-size="16">Same application contract, progressively stronger infrastructure boundaries</text>
    <g><rect x="65" y="155" width="330" height="430" rx="22" fill="#111619" stroke="#2e3937"/><text x="95" y="204" fill="#78c6a3" font-size="24" font-weight="700">LOCAL / DEMO</text><text x="95" y="239" fill="#f1f4f3" font-size="17">可复现开发 / Reproducible</text><path d="M95 268 H365" stroke="#28312f"/><text x="95" y="310" fill="#d9dfdc" font-size="18">SQLite</text><text x="95" y="355" fill="#d9dfdc" font-size="18">Local uploads</text><text x="95" y="400" fill="#d9dfdc" font-size="18">In-memory rate limits</text><text x="95" y="445" fill="#d9dfdc" font-size="18">Optional telemetry</text><rect x="95" y="510" width="220" height="42" rx="21" fill="#202a27"/><text x="205" y="537" text-anchor="middle" fill="#9ed7b3" font-size="14">seed:demo · Browser · E2E</text></g>
    <g><rect x="435" y="155" width="330" height="430" rx="22" fill="#111619" stroke="#3b4b46"/><text x="465" y="204" fill="#d9b76e" font-size="24" font-weight="700">STAGING</text><text x="465" y="239" fill="#f1f4f3" font-size="17">发布演练 / Release rehearsal</text><path d="M465 268 H735" stroke="#28312f"/><text x="465" y="310" fill="#d9dfdc" font-size="18">PostgreSQL candidate</text><text x="465" y="355" fill="#d9dfdc" font-size="18">Isolated bucket + CDN</text><text x="465" y="400" fill="#d9dfdc" font-size="18">Redis shared limits</text><text x="465" y="445" fill="#d9dfdc" font-size="18">Dedicated Sentry env</text><rect x="465" y="510" width="220" height="42" rx="21" fill="#2d291d"/><text x="575" y="537" text-anchor="middle" fill="#ead29a" font-size="14">migrate · restore · smoke</text></g>
    <g><rect x="805" y="155" width="330" height="430" rx="22" fill="#111619" stroke="#4b625a"/><text x="835" y="204" fill="#78c6a3" font-size="24" font-weight="700">PRODUCTION</text><text x="835" y="239" fill="#f1f4f3" font-size="17">多实例交付 / Multi-instance</text><path d="M835 268 H1105" stroke="#28312f"/><text x="835" y="310" fill="#d9dfdc" font-size="18">PostgreSQL + PITR</text><text x="835" y="355" fill="#d9dfdc" font-size="18">S3-compatible + CDN</text><text x="835" y="400" fill="#d9dfdc" font-size="18">Redis + WAF</text><text x="835" y="445" fill="#d9dfdc" font-size="18">Required observability</text><rect x="835" y="510" width="220" height="42" rx="21" fill="#173126"/><text x="945" y="537" text-anchor="middle" fill="#a9dfc0" font-size="14">guard · backup · rollback</text></g>
    <text x="600" y="630" text-anchor="middle" fill="#8d9995" font-size="15">Secrets stay server-side · environments never share credentials or data</text>
  </g>
</svg>
